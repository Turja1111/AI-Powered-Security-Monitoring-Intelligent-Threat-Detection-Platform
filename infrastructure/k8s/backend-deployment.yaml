apiVersion: apps/v1
kind: Deployment
metadata:
  name: securewatch-backend
  labels:
    app: securewatch-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: securewatch-backend
  template:
    metadata:
      labels:
        app: securewatch-backend
    spec:
      containers:
      - name: backend
        image: gcr.io/securewatch-platform/backend:latest
        command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: securewatch-secrets
        - configMapRef:
            name: securewatch-config
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /api/v1/health/
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: securewatch-backend-svc
spec:
  selector:
    app: securewatch-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
