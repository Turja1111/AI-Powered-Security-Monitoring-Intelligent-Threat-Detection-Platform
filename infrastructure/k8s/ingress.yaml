apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: securewatch-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/websocket-services: securewatch-backend-svc
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
  - host: securewatch.domain.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: securewatch-frontend-svc
            port:
              number: 80
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: securewatch-backend-svc
            port:
              number: 8000
      - path: /ws/
        pathType: Prefix
        backend:
          service:
            name: securewatch-backend-svc
            port:
              number: 8000
