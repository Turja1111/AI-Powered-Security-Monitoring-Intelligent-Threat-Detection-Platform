global:
  scrape_interval: 15s

scrape_configs:
  - job_name: django-backend
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics

  - job_name: ml-service
    static_configs:
      - targets: ['ml-service:8001']
    metrics_path: /metrics

  - job_name: kafka
    static_configs:
      - targets: ['kafka:9092']

  - job_name: postgres
    static_configs:
      - targets: ['db:5432']
