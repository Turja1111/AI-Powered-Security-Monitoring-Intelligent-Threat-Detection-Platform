name: Platform Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy-gcp:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Configure Docker to use Artifact Registry
      run: |
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    - name: Build and Push Backend Container
      run: |
        docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/securewatch/backend:latest ./backend
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/securewatch/backend:latest

    - name: Build and Push ML Service Container
      run: |
        docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/securewatch/ml-service:latest ./ml-service
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/securewatch/ml-service:latest
